<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Providencia AI | Red Neuronal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #neural-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* Let clicks pass through to chat */
        }

        .glass-chat {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(251, 191, 36, 0.3);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(251, 191, 36, 0.5);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #fbbf24;
        }

        .message-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        .msg-user {
            background-color: rgba(14, 165, 233, 0.8);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .msg-bot {
            background-color: rgba(51, 65, 85, 0.8);
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border-left: 3px solid #fbbf24;
        }

        /* Markdown Styles in Bot Message */
        .msg-bot strong { color: #fbbf24; }
        .msg-bot h1, .msg-bot h2, .msg-bot h3 { color: #fbbf24; font-weight: bold; margin-top: 8px; margin-bottom: 4px; }
        .msg-bot ul { list-style-type: disc; margin-left: 20px; margin-bottom: 8px; }
        .msg-bot p { margin-bottom: 8px; }
        .msg-bot p:last-child { margin-bottom: 0; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background-color: rgba(51, 65, 85, 0.8);
            border-radius: 12px;
            border-bottom-left-radius: 2px;
            border-left: 3px solid #fbbf24;
            width: fit-content;
            margin-bottom: 12px;
            align-self: flex-start;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: #fbbf24;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="relative flex items-center justify-center">

    <!-- CANVAS ANIMATION BACKGROUND -->
    <canvas id="neural-canvas"></canvas>

    <!-- MAIN CHAT INTERFACE -->
    <div class="glass-chat w-full max-w-4xl h-[95vh] md:h-[90vh] rounded-2xl flex flex-col overflow-hidden relative m-4">
        
        <!-- Header -->
        <div class="px-6 py-4 border-b border-yellow-500/30 flex items-center justify-between bg-slate-900/50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-slate-800 border-2 border-yellow-500 flex items-center justify-center shadow-[0_0_10px_rgba(251,191,36,0.3)]">
                    <i class="fas fa-brain text-yellow-500"></i>
                </div>
                <div>
                    <h1 class="font-bold text-white tracking-wide">Red Neuronal Providencia</h1>
                    <p class="text-xs text-yellow-500 font-mono" id="status-text">CONECTADO AL DRIVE</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadChat()" class="text-slate-400 hover:text-green-400 transition-colors p-2" title="Descargar conversación">
                    <i class="fas fa-file-download"></i>
                </button>
                <button onclick="clearChat()" class="text-slate-400 hover:text-red-400 transition-colors p-2" title="Borrar historial">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </div>

        <!-- Chat History -->
        <div id="chat-history" class="flex-1 overflow-y-auto p-4 md:p-6 flex flex-col">
            <!-- Messages will appear here -->
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-slate-900/60 border-t border-yellow-500/30">
            <form id="chat-form" class="flex gap-2 relative">
                <input 
                    type="text" 
                    id="user-input" 
                    class="flex-1 bg-slate-800/80 border border-slate-600 focus:border-yellow-500 rounded-xl px-4 py-3 text-white outline-none placeholder-slate-400 transition-colors"
                    placeholder="Escribe tu consulta aquí..."
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    id="send-btn"
                    class="bg-yellow-600 hover:bg-yellow-500 text-white rounded-xl px-5 flex items-center justify-center transition-colors disabled:opacity-50"
                >
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>

    </div>

    <script>
        // -----------------------------------------------------------------------------------------
        // ⚠️ ATENCIÓN: CAMBIA ESTO POR TU URL DE RENDER PARA CONECTAR AL BACKEND Y GOOGLE DRIVE ⚠️
        const BACKEND_URL = "https://tu-backend-aqui.onrender.com"; 
        // -----------------------------------------------------------------------------------------

        /* ==========================================
           NEURAL NETWORK CANVAS ANIMATION
           ========================================== */
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;
        
        // Settings
        const numberOfParticles = window.innerWidth > 768 ? 120 : 60;
        const particleColor = '#fbbf24'; // Yellow-500
        const lineColor = 'rgba(251, 191, 36, '; 
        const connectionDistance = 150;

        let mouse = { x: null, y: null, radius: 150 };

        // Real mouse tracking since canvas is behind, we track on window
        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined; 
            mouse.y = undefined;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y; this.directionX = directionX; this.directionY = directionY; this.size = size; this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                // Mouse interaction
                if (mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        const forceDirectionX = dx / distance;
                        const forceDirectionY = dy / distance;
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x -= forceDirectionX * force * 3;
                        this.y -= forceDirectionY * force * 3;
                    }
                }

                // Bounds
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
                
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                let directionX = (Math.random() * 0.5) - 0.25;
                let directionY = (Math.random() * 0.5) - 0.25;
                particlesArray.push(new Particle(x, y, directionX, directionY, size, particleColor));
            }
        }

        function connectParticles() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (connectionDistance * connectionDistance)) {
                        opacityValue = 1 - (distance / (connectionDistance * connectionDistance));
                        ctx.strokeStyle = lineColor + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateParticles() {
            requestAnimationFrame(animateParticles);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connectParticles();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animateParticles();


        /* ==========================================
           CHAT LOGIC
           ========================================== */
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatHistory = document.getElementById('chat-history');
        const statusText = document.getElementById('status-text');
        const sendBtn = document.getElementById('send-btn');

        marked.setOptions({ breaks: true, gfm: true });

        const DEFAULT_MSG = "¡Hola! Soy tu asistente conectado a la base de datos de Providencia. ¿Qué deseas consultar hoy sobre nuestros documentos?";

        function initChat() {
            const savedHTML = localStorage.getItem('providenciaSimpleChat');
            if (savedHTML) {
                chatHistory.innerHTML = savedHTML;
            } else {
                addMessage(DEFAULT_MSG, 'bot');
            }
            scrollToBottom();
        }

        function saveChat() {
            localStorage.setItem('providenciaSimpleChat', chatHistory.innerHTML);
        }

        function clearChat() {
            if(confirm("¿Borrar historial?")) {
                chatHistory.innerHTML = '';
                localStorage.removeItem('providenciaSimpleChat');
                addMessage(DEFAULT_MSG, 'bot');
            }
        }

        function downloadChat() {
            let content = "--- HISTORIAL DE CHAT: RED NEURONAL PROVIDENCIA ---\n\n";
            const messages = document.querySelectorAll('.message-bubble');
            
            if(messages.length <= 1) {
                alert("Primero haz algunas consultas antes de descargar.");
                return;
            }

            messages.forEach(msg => {
                let cleanText = msg.innerText.replace(/\n\n/g, '\n'); 
                let sender = msg.classList.contains('msg-bot') ? 'PROVIDENCIA AI 🦫' : 'USUARIO 👤';
                content += `[${sender}]:\n${cleanText}\n\n-------------------\n\n`;
            });
            
            const date = new Date().toISOString().slice(0,10);
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `asesoria_providencia_${date}.txt`;
            a.click();
        }

        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function addMessage(text, sender, isMarkdown = true) {
            const div = document.createElement('div');
            div.className = `message-bubble ${sender === 'user' ? 'msg-user' : 'msg-bot'}`;
            div.innerHTML = isMarkdown && sender === 'bot' ? marked.parse(text) : text;
            chatHistory.appendChild(div);
            scrollToBottom();
            saveChat();
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'typing-indicator';
            div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            chatHistory.appendChild(div);
            scrollToBottom();
        }

        function removeTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if(!text) return;

            addMessage(text, 'user', false);
            userInput.value = '';
            
            statusText.textContent = "CONSULTANDO DRIVE...";
            statusText.classList.add('animate-pulse');
            userInput.disabled = true;
            sendBtn.disabled = true;
            showTyping();

            try {
                const url = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                            ? 'http://localhost:8000/chat' 
                            : `${BACKEND_URL}/chat`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if(!response.ok) throw new Error("Error del servidor");
                
                const data = await response.json();
                removeTyping();
                addMessage(data.reply, 'bot');

            } catch (error) {
                console.error(error);
                removeTyping();
                addMessage("⚠️ Error de conexión con el backend. Verifica que la URL de Render esté configurada correctamente en el código.", 'bot');
            } finally {
                statusText.textContent = "CONECTADO AL DRIVE";
                statusText.classList.remove('animate-pulse');
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        });

        document.addEventListener('DOMContentLoaded', initChat);

    </script>
</body>
</html>
